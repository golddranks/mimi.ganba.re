<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Japanese Ear Training</title>
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <div id="topbar" aria-label="Last 30 days of practice"></div>

    <main id="stage">
        <div id="message"></div>
        <div id="score"></div>
        <div id="streak" hidden></div>

        <button id="primary">Start</button>
        <div id="choices" hidden></div>
    </main>

    <audio id="audio" preload="auto"></audio>
    <script src="app.js"></script>
</body>

</html>
