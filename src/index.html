<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>mimi.ganba.re – Japanese Ear Training</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <header id="title">MIMI.GANBA.RE</header>
    <a id="privacy" href="privacy/">privacy</a>
    <div id="topbar" aria-label="Last 30 days of practice"></div>

    <main id="stage">
        <div id="message"></div>
        <div id="score"></div>
        <div id="streak" hidden></div>
        <div id="daystreak" hidden></div>

        <button id="primary">Start</button>
        <div id="choices" hidden></div>
    </main>

    <div id="tip"></div>
    <div id="relistenwarn" hidden>You'll break your streak?! OK?</div>
    <button id="relisten" aria-label="Listen again">↻</button>

    <div id="remindprompt" hidden>
        <span>It seems you missed training yesterday. Want a daily reminder so you can keep up your daily streak?</span>
        <button id="remindyes" type="button">Enable</button>
        <button id="remindno" type="button" aria-label="Dismiss">×</button>
    </div>

    <audio id="audio" preload="auto"></audio>
    <script src="app.js"></script>
</body>

</html>
