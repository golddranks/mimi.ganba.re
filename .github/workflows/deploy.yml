name: Build and deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'worker/**'
      - 'data/phonetic_training/morae/good/**'
      - 'scripts/**'
      - 'shell.nix'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      pages:  ${{ steps.filter.outputs.pages }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        id: filter
        with:
          filters: |
            pages:
              - 'src/**'
              - 'data/phonetic_training/morae/good/**'
              - 'scripts/voicemap.py'
              - 'scripts/transcode_audio.py'
              - 'scripts/build.py'
              - 'shell.nix'
              - '.github/workflows/deploy.yml'
            worker:
              - 'worker/**'
              - 'src/skill.js'                # bundled into the worker via import
              - 'data/phonetic_training/morae/good/**'
              - 'scripts/voicemap.py'
              - '.github/workflows/deploy.yml'

  transcode:
    needs: changes
    if: needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        id: opus
        with:
          path: dist/audio
          key: opus-${{ hashFiles('data/phonetic_training/morae/good/**') }}

      # Fast path: cache hit → setup-python is enough (voicemap.py only, no ffmpeg).
      - if: steps.opus.outputs.cache-hit == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.14.0'
      - if: steps.opus.outputs.cache-hit == 'true'
        run: python scripts/voicemap.py

      # Slow path: cache miss → nix only, no setup-python.
      # Mixing the two leaks LD_LIBRARY_PATH from setup-python's libpython into
      # nix-shell, which then segfaults nix's python on startup. Keeping them
      # mutually exclusive in this job avoids that.
      - if: steps.opus.outputs.cache-hit != 'true'
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b  # v27
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/64c08a7ca051951c8eae34e3e3cb1e202fe36786.tar.gz
      - if: steps.opus.outputs.cache-hit != 'true'
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39  # v13
        with:
          use-flakehub: false
      - if: steps.opus.outputs.cache-hit != 'true'
        run: nix-shell --run "python scripts/voicemap.py && python scripts/transcode_audio.py"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: audio
          path: dist/audio
          if-no-files-found: error

  bundle:
    needs: changes
    if: needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.14.0'
      - run: python scripts/voicemap.py
      # build.py minifies via esbuild (standalone binary, no node_modules).
      # Pinned; the dl script drops ./esbuild in the repo root where build.py
      # looks for it. Keep this version in sync with scripts/build.py + dev.sh.
      - run: curl -fsSL https://esbuild.github.io/dl/v0.28.0 | sh
      - run: python scripts/build.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: html
          path: dist
          # `path: dist` uploads the CONTENTS of dist/ (not a "dist/" prefix in
          # the archive). deploy-pages's download therefore uses `path: dist`
          # to put them back. include-hidden-files preserves .nojekyll.
          if-no-files-found: error
          include-hidden-files: true

  deploy-pages:
    needs: [changes, transcode, bundle]
    if: needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: html
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: audio
          path: dist/audio
      - run: echo "mimi.ganba.re" > dist/CNAME
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5

  deploy-worker:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    environment: worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.14.0'
      - run: python scripts/voicemap.py
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22.22.3'
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          wranglerVersion: '4.93.0'
