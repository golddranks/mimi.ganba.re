name: Deploy worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'data/phonetic_training/morae/good/**'
      - 'scripts/build.py'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'    # wrangler 4 requires Node ≥22
      - name: Regenerate voice map
        run: python scripts/build.py --voicemap-only
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          # Match worker/package.json so CI runs the same wrangler as local
          # dev; without this the action falls back to a bundled (older) one.
          wranglerVersion: '4.93.0'
