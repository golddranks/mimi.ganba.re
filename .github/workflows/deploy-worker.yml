name: Deploy worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'data/phonetic_training/morae/good/**'
      - 'scripts/build.py'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Regenerates worker/src/voicemap.js from data/.../good/. We don't
      # need ffmpeg or anything else, so plain Python is enough — no nix.
      - name: Regenerate voice map
        run: python scripts/build.py --voicemap-only
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
